<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changer le mot de passe - Sannad Tech</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--primary); }
        .login-box { background: var(--white); padding: 40px; border-radius: var(--radius); box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
        .login-box h1 { text-align: center; color: var(--primary); margin-bottom: 5px; font-size:1.3rem; }
        .login-box p { text-align: center; color: var(--text-light); margin-bottom: 30px; }
        .alert { margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1><i class="fas fa-lock"></i> Changer le mot de passe</h1>
        <p>Vous devez définir un nouveau mot de passe avant de continuer</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>Nouveau mot de passe</label>
                <input type="password" name="nouveau_password" required minlength="4" placeholder="Minimum 4 caractères" style="width:100%">
            </div>
            <div class="form-group">
                <label>Confirmer le mot de passe</label>
                <input type="password" name="confirmation_password" required minlength="4" placeholder="Répéter le mot de passe" style="width:100%">
            </div>
            <button type="submit" class="btn btn-primary btn-block" style="padding:14px;font-size:1.05rem">
                <i class="fas fa-save"></i> Enregistrer
            </button>
        </form>
        <p style="margin-top:20px;text-align:center;font-size:0.85rem">
            <a href="{{ url_for('admin_logout') }}" style="color:var(--text-light)"><i class="fas fa-sign-out-alt"></i> Annuler et se déconnecter</a>
        </p>
    </div>
</body>
</html>
