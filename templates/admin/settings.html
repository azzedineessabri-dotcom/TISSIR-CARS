{% extends "admin/base_admin.html" %}
{% block title %}Paramètres - Sannad Admin{% endblock %}
{% block header %}Paramètres de l'application{% endblock %}
{% block content %}

<form method="POST" class="booking-form" style="max-width:700px">
    <h3 style="color:var(--primary);margin-bottom:20px"><i class="fas fa-building"></i> Informations de la société</h3>
    <div class="form-group">
        <label>Nom de la société</label>
        <input type="text" name="company_name" value="{{ company_name }}" placeholder="Sannad Tech">
    </div>
    <div class="form-group">
        <label>Adresse</label>
        <input type="text" name="company_address" value="{{ company_address }}" placeholder="123 Avenue Hassan II, Casablanca">
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>Téléphone</label>
            <input type="text" name="company_phone" value="{{ company_phone }}" placeholder="+212 5XX-XXXXXX">
        </div>
        <div class="form-group">
            <label>Téléphone 2 (WhatsApp)</label>
            <input type="text" name="company_phone2" value="{{ company_phone2 }}" placeholder="+212 6XX-XXXXXX">
        </div>
    </div>
    <div class="form-group">
        <label>Email de contact</label>
        <input type="email" name="company_email" value="{{ company_email }}" placeholder="contact@sannadtech.ma">
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>Horaires semaine</label>
            <input type="text" name="company_hours_week" value="{{ company_hours_week }}" placeholder="Lun - Sam : 08:00 - 20:00">
        </div>
        <div class="form-group">
            <label>Horaires dimanche</label>
            <input type="text" name="company_hours_weekend" value="{{ company_hours_weekend }}" placeholder="Dimanche : 09:00 - 16:00">
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>Facebook (URL)</label>
            <input type="text" name="company_facebook" value="{{ company_facebook }}" placeholder="https://facebook.com/...">
        </div>
        <div class="form-group">
            <label>Instagram (URL)</label>
            <input type="text" name="company_instagram" value="{{ company_instagram }}" placeholder="https://instagram.com/...">
        </div>
    </div>

    <hr style="margin:25px 0;border:none;border-top:1px solid #eee">

    <h3 style="color:var(--primary);margin-bottom:20px"><i class="fas fa-envelope"></i> Configuration SMTP</h3>
    <div class="form-row">
        <div class="form-group">
            <label>Serveur SMTP</label>
            <input type="text" name="smtp_server" value="{{ smtp_server }}" placeholder="smtp.gmail.com">
        </div>
        <div class="form-group">
            <label>Port SMTP</label>
            <input type="number" name="smtp_port" value="{{ smtp_port }}" placeholder="587">
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>Nom d'utilisateur SMTP</label>
            <input type="text" name="smtp_username" value="{{ smtp_username }}" placeholder="exemple@gmail.com">
        </div>
        <div class="form-group">
            <label>Mot de passe SMTP</label>
            <input type="password" name="smtp_password" value="{{ smtp_password }}" placeholder="Mot de passe d'application">
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>Expéditeur (De)</label>
            <input type="text" name="smtp_sender" value="{{ smtp_sender }}" placeholder="Sannad Tech <contact@sannadtech.ma>">
        </div>
        <div class="form-group">
            <label>Email admin (réception)</label>
            <input type="email" name="admin_email" value="{{ admin_email }}" placeholder="admin@sannadtech.ma">
        </div>
    </div>

    <hr style="margin:25px 0;border:none;border-top:1px solid #eee">

    <h3 style="color:var(--primary);margin-bottom:20px"><i class="fab fa-whatsapp"></i> Numéro WhatsApp (bouton flottant)</h3>
    <div class="form-group">
        <input type="text" name="whatsapp_number" value="{{ whatsapp_number }}" placeholder="212600000000">
    </div>

    <div style="display:flex;gap:10px;margin-top:25px">
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Enregistrer</button>
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline">Annuler</a>
    </div>
</form>

{% endblock %}
